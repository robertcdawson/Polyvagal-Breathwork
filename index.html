<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Guided breathwork practice with polyvagal techniques: extended exhale, box breathing, resonance, VOO breath, and physiological sigh. Visual pacer and optional audio cues.">
    <meta name="theme-color" content="#a8e0ff">
    <title>Advanced Breathwork</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%233b82f6' stroke-width='2'/><circle cx='16' cy='16' r='6' fill='%233b82f6' opacity='0.6'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Audio Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Ocean Theme */
            --bg-gradient-start: #a8e0ff;
            --bg-gradient-end: #8ee3f8;
            --card-bg: rgba(255, 255, 255, 0.4);
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --button-primary-bg: #3b82f6;
            --button-primary-hover: #2563eb;
            --circle-base-bg: rgba(255, 255, 255, 0.2);
            --circle-fill-color: rgba(255, 255, 255, 0.7);
            
            --phase-inhale: rgba(132, 204, 22, 0.6);
            --phase-hold-in: rgba(96, 165, 250, 0.6);
            --phase-exhale: rgba(34, 197, 94, 0.6);
            --phase-hold-out: rgba(156, 163, 175, 0.6);
        }
        .theme-forest {
            --bg-gradient-start: #D4E2D4;
            --bg-gradient-end: #A2B29F;
            --card-bg: rgba(255, 255, 255, 0.5);
            --text-primary: #2C3333;
            --text-secondary: #395144;
            --button-primary-bg: #4E6C50;
            --button-primary-hover: #395144;
            --circle-base-bg: rgba(255, 255, 255, 0.3);
            --circle-fill-color: rgba(170, 204, 170, 0.8);
            
            --phase-inhale: rgba(78, 108, 80, 0.6);
            --phase-hold-in: rgba(57, 81, 68, 0.6);
            --phase-exhale: rgba(170, 204, 170, 0.6);
            --phase-hold-out: rgba(212, 226, 212, 0.6);
        }
        .theme-cosmic {
            --bg-gradient-start: #232526;
            --bg-gradient-end: #414345;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-primary: #F5F5F5;
            --text-secondary: #D4D4D4;
            --button-primary-bg: #8E44AD;
            --button-primary-hover: #9B59B6;
            --circle-base-bg: rgba(255, 255, 255, 0.1);
            --circle-fill-color: rgba(236, 240, 241, 0.5);
            
            --phase-inhale: rgba(155, 89, 182, 0.6);
            --phase-hold-in: rgba(142, 68, 173, 0.6);
            --phase-exhale: rgba(52, 152, 219, 0.6);
            --phase-hold-out: rgba(44, 62, 80, 0.6);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            transition: background 0.5s ease-in-out;
            color: var(--text-primary);
        }

        /* iOS Safari: use dynamic viewport height so the collapsing toolbar
           does not clip content, and pad for the notch / home indicator. */
        .app-shell {
            min-height: 100vh; /* fallback for older browsers */
            min-height: -webkit-fill-available;
            min-height: 100dvh;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        }
        @media (min-width: 640px) {
            .app-shell {
                padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
            }
        }

        /* iOS Safari zooms the page when focusing a control whose font-size is
           below 16px; pin form controls to 16px to prevent that jump. */
        input, select, button { font-size: 16px; }
        .main-card { background-color: var(--card-bg); }
        .btn-primary { background-color: var(--button-primary-bg); }
        .btn-primary:hover { background-color: var(--button-primary-hover); }
        #circle { background-color: var(--circle-base-bg); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #circle-fill { background-color: var(--circle-fill-color); border-radius: 50%; width: 100%; height: 100%; transform: scale(0.3); transition: none; will-change: transform; }
        
        .phase-inhale { background-color: var(--phase-inhale) !important; }
        .phase-hold-in { background-color: var(--phase-hold-in) !important; }
        .phase-exhale { background-color: var(--phase-exhale) !important; }
        .phase-hold-out { background-color: var(--phase-hold-out) !important; }

        .preset-btn.active { background-color: var(--button-primary-bg); color: white; }
        .fade-transition { transition: opacity 0.3s ease-in-out; }

        /* WCAG 2.2: visible focus for keyboard; theme-aware */
        :focus { outline: none; }
        :focus-visible {
            outline: 2px solid var(--button-primary-bg);
            outline-offset: 2px;
        }
        .theme-cosmic :focus-visible { outline-color: #9B59B6; }

        /* Touch targets ≥44px (AAA); consistent control height */
        .control-height { min-height: 44px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }

        /* Immersive session mode: collapse non-essential UI */
        .session-collapse {
            max-height: 600px;
            overflow: hidden;
            transition: max-height 0.35s ease-out, opacity 0.25s ease-out;
        }
        .session-active .session-collapse {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }
        .session-active .session-collapse-heading { display: none; }
        .session-active #progressRing { opacity: 1; }

        @keyframes completePulse {
            0% { transform: scale(0.3); }
            35% { transform: scale(1.08); }
            70% { transform: scale(0.95); }
            100% { transform: scale(0.3); }
        }
        #circle-fill.complete-pulse { animation: completePulse 1.4s ease-out 1; }
    </style>
</head>
<body class="gradient-bg">
    <main class="app-shell flex flex-col items-center justify-center" id="main-content">
        <div id="mainCard" class="main-card w-full max-w-lg mx-auto backdrop-blur-md rounded-2xl shadow-lg p-6 md:p-8 text-center transition-colors duration-500">
            <h1 class="session-collapse-heading text-2xl md:text-3xl font-bold mb-2">Advanced Breathwork</h1>

            <section class="mb-6" aria-labelledby="breath-status-heading">
                <h2 id="breath-status-heading" class="sr-only">Breath phase and timer</h2>
                <div class="relative w-48 h-48 md:w-56 md:h-56 mx-auto mb-4 flex items-center justify-center">
                    <svg id="progressRing" class="absolute inset-0 w-full h-full -rotate-90 pointer-events-none opacity-0 transition-opacity duration-300" aria-hidden="true" viewBox="0 0 100 100">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
                        <circle id="progressRingStroke" cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" stroke-dasharray="295.31" stroke-dashoffset="295.31"/>
                    </svg>
                    <div id="circle" class="relative w-full h-full rounded-full shadow-inner" role="img" aria-hidden="true">
                        <div id="circle-fill" class="absolute inset-0 z-0" aria-hidden="true"></div>
                        <div class="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none" aria-live="polite" aria-atomic="true">
                            <p id="instruction" class="text-2xl font-semibold fade-transition">Ready?</p>
                            <p id="timer" class="text-5xl font-bold" aria-hidden="true">-</p>
                        </div>
                    </div>
                </div>
                <p id="sessionTimeDisplay" class="h-6 mb-4 min-h-[1.5rem]" style="color: var(--text-secondary);"></p>
            </section>

            <section class="mb-8" aria-labelledby="practice-settings-heading">
                <div class="session-collapse">
                    <h2 id="practice-settings-heading" class="sr-only">Practice settings</h2>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label for="practiceMode" class="block mb-2">Practice By</label>
                            <select id="practiceMode" class="control-height w-full px-3 py-2 text-center bg-white/50 rounded-lg border-2 border-transparent focus:border-blue-400 focus:outline-none" aria-describedby="durationLabel">
                                <option value="cycles" selected>Cycles</option>
                                <option value="time">Time</option>
                            </select>
                        </div>
                        <div>
                            <label id="durationLabel" for="durationInput" class="block mb-2">Duration (min)</label>
                            <input type="number" inputmode="decimal" id="durationInput" class="control-height w-full px-3 py-2 text-center bg-white/50 rounded-lg border-2 border-transparent focus:border-blue-400 focus:outline-none" value="5" min="1" aria-label="Session duration">
                        </div>
                    </div>
                    <div class="flex justify-center mb-6">
                        <div class="relative min-w-[120px] min-h-[44px]">
                            <button id="startButton" type="button" class="btn-primary absolute inset-0 w-full min-h-[44px] text-white font-bold py-3 px-6 rounded-full shadow-md transition-all transform hover:scale-105 active:scale-95" aria-label="Start breathwork session">Start</button>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center">
                    <button id="stopButton" type="button" class="min-w-[120px] min-h-[44px] bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-6 rounded-full shadow-md transition-all transform hover:scale-105 active:scale-95 hidden" aria-label="Stop breathwork session">Stop</button>
                </div>
            </section>

            <section class="mb-8 session-collapse" aria-labelledby="presets-heading">
                <h2 id="presets-heading" class="text-lg font-semibold border-b border-white/50 pb-2 mb-4">Presets</h2>
                <div id="presets" class="grid grid-cols-2 md:grid-cols-3 gap-2" role="group" aria-label="Breathwork technique presets">
                    <button type="button" class="preset-btn control-height p-3 bg-white/50 rounded-lg text-left" data-preset="extendedExhale">Extended Exhale</button>
                    <button type="button" class="preset-btn control-height p-3 bg-white/50 rounded-lg text-left" data-preset="boxBreathing">Box Breathing</button>
                    <button type="button" class="preset-btn control-height p-3 bg-white/50 rounded-lg text-left" data-preset="resonance">Resonance</button>
                    <button type="button" class="preset-btn control-height p-3 bg-white/50 rounded-lg text-left" data-preset="vooBreathing">VOO Breath</button>
                    <button type="button" class="preset-btn control-height p-3 bg-white/50 rounded-lg text-left col-span-2 md:col-span-1" data-preset="physiologicalSigh">Physiological Sigh</button>
                </div>
                <p id="preset-description" class="text-sm mt-4 min-h-[4rem] text-center flex items-center justify-center" style="color: var(--text-secondary);" aria-live="polite"></p>
                <div id="resonanceControl" class="hidden mt-2 text-left">
                    <label for="resonanceRate" class="block mb-2 text-sm">Resonance rate: <span id="resonanceRateValue">6.0</span> breaths/min</label>
                    <input type="range" id="resonanceRate" min="4.5" max="6.5" step="0.5" value="6" class="w-full" aria-label="Resonance breathing rate in breaths per minute">
                    <button type="button" id="findResonanceButton" class="mt-3 control-height w-full px-3 py-2 bg-white/50 rounded-lg text-sm">Find my resonance (guided sweep)</button>
                    <p class="text-xs mt-2" style="color: var(--text-secondary);">Most people resonate between 4.5 and 6.5 breaths/min. Try a few rates and keep the one that feels smoothest.</p>
                </div>
            </section>

            <section id="settings" class="space-y-4 text-left session-collapse" aria-labelledby="advanced-settings-heading">
                <details>
                    <summary id="advanced-settings-heading" class="font-semibold cursor-pointer control-height flex items-center rounded">Advanced Settings</summary>
                    <div class="mt-4 space-y-4">
                        <div class="flex items-center justify-between gap-4"><label for="inhale">Inhale (s)</label><input type="number" inputmode="decimal" id="inhale" class="control-height w-20 p-2 text-center bg-white/50 rounded-lg" value="4" min="1" aria-label="Inhale duration in seconds"></div>
                        <div class="flex items-center justify-between gap-4"><label for="holdIn">Hold In (s)</label><input type="number" inputmode="decimal" id="holdIn" class="control-height w-20 p-2 text-center bg-white/50 rounded-lg" value="2" min="0" aria-label="Hold after inhale in seconds"></div>
                        <div class="flex items-center justify-between gap-4"><label for="exhale">Exhale (s)</label><input type="number" inputmode="decimal" id="exhale" class="control-height w-20 p-2 text-center bg-white/50 rounded-lg" value="8" min="1" aria-label="Exhale duration in seconds"></div>
                        <div class="flex items-center justify-between gap-4"><label for="holdOut">Hold Out (s)</label><input type="number" inputmode="decimal" id="holdOut" class="control-height w-20 p-2 text-center bg-white/50 rounded-lg" value="0" min="0" aria-label="Hold after exhale in seconds"></div>
                    </div>
                </details>
            </section>

            <section class="mt-8 border-t border-white/50 pt-6 session-collapse" aria-labelledby="appearance-heading">
                <h2 id="appearance-heading" class="sr-only">Appearance and audio</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="themeSelector" class="block mb-2">Theme</label>
                        <select id="themeSelector" class="control-height w-full px-3 py-2 text-center bg-white/50 rounded-lg" aria-label="Color theme">
                            <option value="default">Ocean</option>
                            <option value="theme-forest">Forest</option>
                            <option value="theme-cosmic">Cosmic</option>
                        </select>
                    </div>
                    <div>
                        <label for="audioToggle" class="block mb-2">Audio Cues</label>
                        <button type="button" id="audioToggle" class="control-height w-full px-3 py-2 bg-white/50 rounded-lg" aria-pressed="false" aria-label="Toggle audio cues for breath phases">OFF</button>
                    </div>
                </div>
            </section>

            <section id="historySection" class="mt-8 session-collapse" aria-labelledby="history-heading">
                <h2 id="history-heading" class="sr-only">Practice history</h2>
                <button type="button" id="historyButton" class="font-semibold control-height px-2 flex items-center rounded" aria-expanded="false" aria-controls="historyLog">Practice History</button>
                <div id="historyLog" class="hidden mt-4 text-left text-sm space-y-2 max-h-48 overflow-y-auto" role="region" aria-labelledby="history-heading">
                    <p>Loading history...</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- DOM Elements ---
        const getEl = (id) => document.getElementById(id);
        const UIElements = {
            mainCard: getEl('mainCard'),
            body: document.body,
            circleFill: getEl('circle-fill'),
            progressRingStroke: getEl('progressRingStroke'),
            instruction: getEl('instruction'),
            timer: getEl('timer'),
            startButton: getEl('startButton'),
            stopButton: getEl('stopButton'),
            settings: getEl('settings'),
            presetsDiv: getEl('presets'),
            presetDescription: getEl('preset-description'),
            resonanceControl: getEl('resonanceControl'),
            resonanceRate: getEl('resonanceRate'),
            resonanceRateValue: getEl('resonanceRateValue'),
            findResonanceButton: getEl('findResonanceButton'),
            durationInput: getEl('durationInput'),
            durationLabel: getEl('durationLabel'),
            sessionTimeDisplay: getEl('sessionTimeDisplay'),
            practiceMode: getEl('practiceMode'),
            themeSelector: getEl('themeSelector'),
            audioToggle: getEl('audioToggle'),
            historySection: getEl('historySection'),
            historyButton: getEl('historyButton'),
            historyLog: getEl('historyLog'),
            inputs: {
                inhale: getEl('inhale'),
                holdIn: getEl('holdIn'),
                exhale: getEl('exhale'),
                holdOut: getEl('holdOut')
            }
        };

        // --- App State ---
        let state = {
            isRunning: false,
            audioEnabled: false,
            currentPracticeMode: 'cycles',
            currentPreset: 'extendedExhale',
            resonanceBpm: 6,
            sweep: null,
            userId: null,
            isAuthReady: false
        };

        let timers = { breathCycle: null, countdown: null, session: null };
        let completionTimeout = null;
        let sessionEndTime, cyclesRemaining, sessionStartTime, totalCycles;
        const PROGRESS_RING_CIRCUMFERENCE = 2 * Math.PI * 47;

        function updateProgressRing(progress) {
            if (!UIElements.progressRingStroke) return;
            const offset = PROGRESS_RING_CIRCUMFERENCE * (1 - Math.min(1, Math.max(0, progress)));
            UIElements.progressRingStroke.style.strokeDashoffset = offset;
        }

        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if (navigator.wakeLock) wakeLock = await navigator.wakeLock.request('screen');
            } catch (_) { /* unsupported or denied */ }
        }
        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
        }

        // iOS releases the screen wake lock and may suspend the audio context
        // whenever the tab is hidden (lock screen, app switch). Re-acquire both
        // when the user returns mid-session so the pacer keeps the screen awake
        // and audio cues keep playing.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState !== 'visible' || !state.isRunning) return;
            requestWakeLock();
            if (state.audioEnabled && typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
                Tone.context.resume().catch(() => {});
            }
        });
        
        // Each technique carries its research-backed dosing (mode + minutes) so
        // selecting it primes a session of the right length in one tap.
        // `values` prefills the editable Advanced Settings (Inhale/Hold/Exhale/Hold);
        // `structured` techniques define their own phase sequence (see getActivePhases)
        // because a fixed 4-slot cycle cannot express e.g. a double inhale.
        const presets = {
            extendedExhale: { name: "Extended Exhale", values: [4, 2, 8, 0], mode: 'time', minutes: 5, desc: "Exhale longer than the inhale (~1:2) to engage the parasympathetic, rest-and-digest response. Inhale through the nose, exhale slowly." },
            boxBreathing: { name: "Box Breathing", values: [4, 4, 4, 4], mode: 'time', minutes: 5, desc: "Equal inhale, hold, exhale, and hold. A simple, balanced pattern for calming stress and steadying focus." },
            resonance: { name: "Resonance", structured: true, mode: 'time', minutes: 5, desc: "Slow, even breathing near your resonance frequency to maximize heart-rate variability. Adjust the rate below to find what feels smoothest." },
            vooBreathing: { name: "VOO Breath", structured: true, values: [4, 1, 8, 0], mode: 'time', minutes: 5, desc: "Inhale through the nose, then hum a long, low \"voo\" on the exhale. The vibration helps stimulate the vagus nerve." },
            physiologicalSigh: { name: "Cyclic Sighing", structured: true, values: [3, 1, 6, 0], mode: 'time', minutes: 5, desc: "A full inhale through the nose, a short second inhale to top up, then a long, slow exhale through the mouth. The most effective pattern for lifting mood and easing stress (Balban et al., 2023)." }
        };

        // --- Breathing phase definitions ---
        // A phase: { name (instruction text), duration (s), scale (target circle
        // scale 0.3-1.0), className (color), note (audio cue or null) }.
        const SIGH_PHASES = [
            { name: 'Inhale (nose)', duration: 2.5, scale: 0.78, className: 'phase-inhale', note: 'C5' },
            { name: 'Inhale again', duration: 1.0, scale: 1.0, className: 'phase-inhale', note: 'E5' },
            { name: 'Exhale (mouth)', duration: 6.5, scale: 0.3, className: 'phase-exhale', note: 'C4' }
        ];
        const VOO_PHASES = [
            { name: 'Inhale (nose)', duration: 4, scale: 1.0, className: 'phase-inhale', note: 'C5' },
            { name: 'Hold', duration: 1, scale: 1.0, className: 'phase-hold-in', note: null },
            { name: 'Exhale — hum "voo"', duration: 8, scale: 0.3, className: 'phase-exhale', note: 'C3' }
        ];

        const RESONANCE_BPM_MIN = 4.5;
        const RESONANCE_BPM_MAX = 6.5;
        function resonancePhases() {
            const half = +(60 / state.resonanceBpm / 2).toFixed(2);
            return [
                { name: 'Inhale', duration: half, scale: 1.0, className: 'phase-inhale', note: 'C5' },
                { name: 'Exhale', duration: half, scale: 0.3, className: 'phase-exhale', note: 'C4' }
            ];
        }
        function phasesFromInputs() {
            return [
                { name: 'Inhale', duration: +UIElements.inputs.inhale.value, scale: 1.0, className: 'phase-inhale', note: 'C5' },
                { name: 'Hold', duration: +UIElements.inputs.holdIn.value, scale: 1.0, className: 'phase-hold-in', note: null },
                { name: 'Exhale', duration: +UIElements.inputs.exhale.value, scale: 0.3, className: 'phase-exhale', note: 'C4' },
                { name: 'Hold', duration: +UIElements.inputs.holdOut.value, scale: 0.3, className: 'phase-hold-out', note: null }
            ];
        }
        function getActivePhases() {
            switch (state.currentPreset) {
                case 'physiologicalSigh': return SIGH_PHASES;
                case 'vooBreathing': return VOO_PHASES;
                case 'resonance': return resonancePhases();
                default: return phasesFromInputs(); // 4-field presets and custom
            }
        }

        let synth;
        function setupAudio() {
            if (Tone.context.state !== 'running') Tone.context.resume();
            synth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
        }

        // --- Firebase (Optional) ---
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };
        
        let db, auth;
        const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

        if (isFirebaseConfigured) {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                onAuthStateChanged(auth, user => {
                    if (user) state.userId = user.uid;
                    else signInAnonymously(auth).catch(e => console.error("Sign-in failed", e));
                    state.isAuthReady = true;
                    fetchHistory();
                });
            } catch (e) {
                console.error("Firebase initialization failed:", e.message);
                UIElements.historySection.innerHTML = `<p class="text-red-500 text-sm">Practice Log disabled due to Firebase error.</p>`;
            }
        } else {
            console.log("Firebase not configured. Practice Log is disabled.");
            UIElements.historySection.innerHTML = `<p class="text-sm">Practice Log disabled. Add Firebase config to enable.</p>`;
        }

        function applyPreset(presetName) {
            const preset = presets[presetName];
            if (!preset) return;
            state.currentPreset = presetName;
            if (preset.values) {
                const [inhale, holdIn, exhale, holdOut] = preset.values;
                UIElements.inputs.inhale.value = inhale;
                UIElements.inputs.holdIn.value = holdIn;
                UIElements.inputs.exhale.value = exhale;
                UIElements.inputs.holdOut.value = holdOut;
            }
            // Apply the technique's research-backed dosing (mode + amount).
            if (preset.mode) {
                state.currentPracticeMode = preset.mode;
                UIElements.practiceMode.value = preset.mode;
                UIElements.durationLabel.textContent = preset.mode === 'time' ? 'Duration (min)' : 'Number of Cycles';
            }
            if (preset.minutes != null) UIElements.durationInput.value = preset.minutes;
            toggleResonanceControl(presetName === 'resonance');
            UIElements.presetDescription.textContent = preset.desc;
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.preset === presetName));
        }

        function toggleResonanceControl(show) {
            if (UIElements.resonanceControl) UIElements.resonanceControl.classList.toggle('hidden', !show);
        }
        function updateResonanceUI() {
            if (UIElements.resonanceRate) UIElements.resonanceRate.value = state.resonanceBpm;
            if (UIElements.resonanceRateValue) UIElements.resonanceRateValue.textContent = (+state.resonanceBpm).toFixed(1);
        }

        function startBreathing() {
            if (state.isRunning) return;
            state.isRunning = true;
            requestWakeLock();
            updateUIForState(true);
            let currentPhaseIndex = -1;
            let cyclePhases = getActivePhases();
            if (state.sweep && state.sweep.active) {
                updateProgressRing(0);
                UIElements.sessionTimeDisplay.textContent = `Finding resonance — ${(+state.resonanceBpm).toFixed(1)} breaths/min`;
            } else if (state.currentPracticeMode === 'time') {
                sessionStartTime = Date.now();
                sessionEndTime = sessionStartTime + parseFloat(UIElements.durationInput.value) * 60000;
                timers.session = setInterval(checkSessionTime, 1000);
            } else {
                totalCycles = parseInt(UIElements.durationInput.value, 10);
                cyclesRemaining = totalCycles;
                UIElements.sessionTimeDisplay.textContent = `${cyclesRemaining} cycles remaining`;
            }
            updateProgressRing(0);

            // Initial state for animation
            UIElements.circleFill.style.transform = 'scale(0.3)';

            let nextPhaseTime = Date.now();

            function runNextPhase() {
                if (!state.isRunning) return;
                currentPhaseIndex++;
                // Wrap at the end of the cycle and refresh phases so live changes
                // (resonance rate, the guided sweep, custom edits) take effect.
                if (currentPhaseIndex >= cyclePhases.length) {
                    currentPhaseIndex = 0;
                    cyclePhases = getActivePhases();
                }
                const lastIndex = cyclePhases.length - 1;
                const phase = cyclePhases[currentPhaseIndex];

                // Skip 0-duration phases
                if (phase.duration <= 0) {
                    if (currentPhaseIndex === lastIndex) handleCycleEnd();
                    runNextPhase(); return;
                }

                // Text Transition
                UIElements.instruction.style.opacity = 0;
                setTimeout(() => {
                    UIElements.instruction.textContent = phase.name;
                    UIElements.instruction.style.opacity = 1;
                }, 200);

                // Circle Animation
                const COLOR_TRANSITION_DURATION_S = 1;
                UIElements.circleFill.style.transition = `transform ${phase.duration}s ease-in-out, background-color ${COLOR_TRANSITION_DURATION_S}s ease`;
                UIElements.circleFill.className = `absolute inset-0 z-0 ${phase.className}`;
                UIElements.circleFill.style.transform = `scale(${phase.scale})`;

                if (state.audioEnabled && phase.note && synth) synth.triggerAttackRelease(phase.note, "8n", Tone.now());
                
                let countdown = parseFloat(phase.duration);
                UIElements.timer.textContent = Math.ceil(countdown);
                clearInterval(timers.countdown);
                timers.countdown = setInterval(() => {
                    countdown -= 1;
                    if(countdown > 0) UIElements.timer.textContent = Math.ceil(countdown);
                }, 1000);
                
                // Drift correction
                nextPhaseTime += phase.duration * 1000;
                let delay = nextPhaseTime - Date.now();
                if (delay < -100) {
                     nextPhaseTime = Date.now() + phase.duration * 1000;
                     delay = phase.duration * 1000;
                }

                timers.breathCycle = setTimeout(() => {
                    if (currentPhaseIndex === lastIndex) handleCycleEnd();
                    runNextPhase();
                }, Math.max(0, delay));
            }
            nextPhaseTime = Date.now();
            runNextPhase();
        }
        
        function stopBreathing(isSessionComplete = false) {
            if (completionTimeout) clearTimeout(completionTimeout);
            const wasSweep = !!(state.sweep && state.sweep.active);
            state.sweep = null;
            if (isSessionComplete && !wasSweep) logSession();
            state.isRunning = false;
            releaseWakeLock();
            Object.values(timers).forEach(timer => clearInterval(timer));
            if (isSessionComplete) {
                updateUIForState(true);
                UIElements.stopButton.classList.add('hidden');
                UIElements.instruction.textContent = 'Complete!';
                UIElements.instruction.style.opacity = '0';
                UIElements.circleFill.classList.add('complete-pulse');
                requestAnimationFrame(() => { UIElements.instruction.style.opacity = '1'; });
                completionTimeout = setTimeout(() => {
                    UIElements.circleFill.classList.remove('complete-pulse');
                    updateUIForState(false);
                    UIElements.instruction.textContent = 'Ready?';
                    UIElements.instruction.style.opacity = '1';
                    completionTimeout = null;
                }, 2200);
            } else {
                updateUIForState(false);
                UIElements.instruction.textContent = 'Ready?';
            }
        }

        function handleCycleEnd() {
            if (state.sweep && state.sweep.active) {
                const sweep = state.sweep;
                sweep.cycleCount++;
                if (sweep.cycleCount >= sweep.cyclesPerRate) {
                    sweep.cycleCount = 0;
                    sweep.idx++;
                    if (sweep.idx >= sweep.rates.length) { stopBreathing(true); return; }
                    state.resonanceBpm = sweep.rates[sweep.idx];
                    updateResonanceUI();
                    UIElements.sessionTimeDisplay.textContent = `Finding resonance — ${(+state.resonanceBpm).toFixed(1)} breaths/min`;
                }
                updateProgressRing((sweep.idx + sweep.cycleCount / sweep.cyclesPerRate) / sweep.rates.length);
                return;
            }
            if (state.currentPracticeMode === 'cycles') {
                cyclesRemaining--;
                updateProgressRing((totalCycles - cyclesRemaining) / totalCycles);
                if (cyclesRemaining > 0) UIElements.sessionTimeDisplay.textContent = `${cyclesRemaining} cycles remaining`;
                else stopBreathing(true);
            }
        }

        // Guided sweep through candidate resonance rates so the user can notice
        // which feels smoothest (Lehrer protocol: 4.5-6.5 bpm in 0.5 steps).
        function startResonanceSweep() {
            if (state.isRunning) return;
            applyPreset('resonance');
            state.sweep = { active: true, rates: [4.5, 5, 5.5, 6, 6.5], idx: 0, cyclesPerRate: 3, cycleCount: 0 };
            state.resonanceBpm = state.sweep.rates[0];
            updateResonanceUI();
            startBreathing();
        }

        function checkSessionTime() {
            const remaining = Math.round((sessionEndTime - Date.now()) / 1000);
            if (remaining <= 0) stopBreathing(true);
            else {
                UIElements.sessionTimeDisplay.textContent = `Time: ${Math.floor(remaining/60)}:${(remaining%60).toString().padStart(2,'0')}`;
                const elapsed = (sessionEndTime - sessionStartTime) / 1000 - remaining;
                updateProgressRing(elapsed / ((sessionEndTime - sessionStartTime) / 1000));
            }
        }

        function updateUIForState(isRunning) {
            UIElements.stopButton.classList.toggle('hidden', !isRunning);
            UIElements.mainCard.classList.toggle('session-active', isRunning);
            if (!isRunning) {
                UIElements.circleFill.style.transition = 'transform 0.5s ease-out';
                UIElements.circleFill.className = 'absolute inset-0 z-0';
                UIElements.circleFill.style.transform = 'scale(0.3)';
                UIElements.timer.textContent = '-';
                UIElements.sessionTimeDisplay.textContent = '';
                UIElements.instruction.style.opacity = 1;
                updateProgressRing(0);
            }
        }

        UIElements.practiceMode.addEventListener('change', (e) => {
            state.currentPracticeMode = e.target.value;
            UIElements.durationLabel.textContent = e.target.value === 'time' ? 'Duration (min)' : 'Number of Cycles';
        });
        UIElements.audioToggle.addEventListener('click', () => {
            state.audioEnabled = !state.audioEnabled;
            UIElements.audioToggle.textContent = state.audioEnabled ? 'ON' : 'OFF';
            UIElements.audioToggle.setAttribute('aria-pressed', state.audioEnabled);
            UIElements.audioToggle.classList.toggle('btn-primary', state.audioEnabled);
            if (state.audioEnabled && !synth) setupAudio();
        });
        // Status-bar / address-bar tint per theme (matches each gradient start color).
        const THEME_COLORS = { default: '#a8e0ff', 'theme-forest': '#d4e2d4', 'theme-cosmic': '#232526' };
        function updateThemeColor(theme) {
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', THEME_COLORS[theme] || THEME_COLORS.default);
        }

        UIElements.themeSelector.addEventListener('change', (e) => {
            const theme = e.target.value;
            UIElements.body.className = theme === 'default' ? '' : theme;
            updateThemeColor(theme);
            localStorage.setItem('theme', theme);
        });
        UIElements.historyButton.addEventListener('click', () => {
            const isExpanded = !UIElements.historyLog.classList.toggle('hidden');
            UIElements.historyButton.setAttribute('aria-expanded', isExpanded);
        });
        UIElements.startButton.addEventListener('click', startBreathing);
        UIElements.stopButton.addEventListener('click', () => stopBreathing(false));
        UIElements.presetsDiv.addEventListener('click', (e) => { if (e.target.dataset.preset) applyPreset(e.target.dataset.preset) });

        if (UIElements.resonanceRate) {
            UIElements.resonanceRate.addEventListener('input', (e) => {
                let bpm = parseFloat(e.target.value);
                bpm = Math.min(RESONANCE_BPM_MAX, Math.max(RESONANCE_BPM_MIN, bpm));
                state.resonanceBpm = bpm;
                UIElements.resonanceRateValue.textContent = bpm.toFixed(1);
            });
        }
        if (UIElements.findResonanceButton) {
            UIElements.findResonanceButton.addEventListener('click', startResonanceSweep);
        }

        // Manually editing the phase durations means the user is no longer on a
        // named preset; treat it as a custom, input-driven pattern.
        Object.values(UIElements.inputs).forEach((input) => {
            input.addEventListener('input', () => {
                if (state.currentPreset === 'custom') return;
                state.currentPreset = 'custom';
                document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
                toggleResonanceControl(false);
                UIElements.presetDescription.textContent = 'Custom pattern — adjust each phase to taste.';
            });
        });

        async function logSession() {
            if (!isFirebaseConfigured || !state.isAuthReady || !state.userId || !db) return;
            const sessionData = {
                technique: (presets[state.currentPreset] && presets[state.currentPreset].name) || 'Custom',
                mode: state.currentPracticeMode,
                value: UIElements.durationInput.value,
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, `users/${state.userId}/sessions`), sessionData);
            } catch (e) { console.error("Error writing to Firestore: ", e) }
        }
        
        function fetchHistory() {
            if (!isFirebaseConfigured || !state.isAuthReady || !state.userId || !db) return;
            const q = query(collection(db, `users/${state.userId}/sessions`), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    UIElements.historyLog.innerHTML = '<p>No sessions recorded yet.</p>'; return;
                }
                UIElements.historyLog.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : '...';
                    const unit = data.mode === 'time' ? 'min' : 'cycles';
                    const logEntry = document.createElement('div');
                    logEntry.className = 'p-2 bg-white/20 rounded';
                    logEntry.textContent = `${date}: ${data.technique} - ${data.value} ${unit}`;
                    UIElements.historyLog.appendChild(logEntry);
                });
            }, error => {
                console.error("Error fetching history: ", error);
                UIElements.historyLog.innerHTML = `<p class="text-red-500">Could not load history.</p>`;
            });
        }
        
        window.onload = () => {
            // Load theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                UIElements.themeSelector.value = savedTheme;
                UIElements.body.className = savedTheme === 'default' ? '' : savedTheme;
            }
            updateThemeColor(UIElements.themeSelector.value);

            updateResonanceUI();
            // applyPreset sets the technique's recommended mode, label, and duration.
            applyPreset('extendedExhale');

            updateUIForState(false);
        };
    </script>
</body>
</html>
